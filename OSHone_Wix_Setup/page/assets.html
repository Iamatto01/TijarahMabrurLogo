<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: '#0A2647',
                        safety: '#E8630A',
                        success: '#2EC4B6',
                        danger: '#E63946',
                        warning: '#FFB703',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: transparent; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <!-- Loading State -->
    <div id="loading" class="flex justify-center items-center h-64">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-navy"></div>
    </div>

    <!-- Main Content -->
    <div id="assets-content" class="hidden max-w-6xl mx-auto space-y-6">
        
        <!-- Header Controls -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="relative w-full md:w-96">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                </div>
                <input type="text" id="search-input" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-navy focus:border-navy sm:text-sm" placeholder="Cari Nama Mesin atau No PMT...">
            </div>
            
            <div class="flex items-center space-x-2 w-full md:w-auto">
                <span class="text-sm text-gray-500 font-medium">Status CF:</span>
                <select id="status-filter" class="block w-full md:w-auto pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-navy focus:border-navy sm:text-sm rounded-lg border">
                    <option value="All">Semua</option>
                    <option value="Valid">Sah (Valid)</option>
                    <option value="Expired">Tamat Tempoh</option>
                </select>
            </div>
        </div>

        <!-- Asset Grid -->
        <div id="assets-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamically populated -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-12 glass-card rounded-2xl">
            <div class="text-4xl mb-3">🔍</div>
            <h3 class="text-lg font-medium text-gray-900">Tiada Mesin Dijumpai</h3>
            <p class="mt-1 text-sm text-gray-500">Cuba tukar carian atau filter anda.</p>
        </div>

    </div>

    <script>
        let allAssets = [];

        window.onload = function() {
            // Bagitahu Velo yang HTML dah sedia terima data
            window.parent.postMessage({ type: 'HTML_READY' }, "*");
        };

        window.onmessage = function(event) {
            if (event.data && event.data.type === 'ASSETS_DATA') {
                allAssets = event.data.assets;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('assets-content').classList.remove('hidden');
                
                renderAssets(allAssets);
            }
        };

        function renderAssets(assets) {
            const grid = document.getElementById('assets-grid');
            const emptyState = document.getElementById('empty-state');
            
            grid.innerHTML = '';
            
            if (assets.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }
            
            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            assets.forEach(asset => {
                const isExpired = new Date(asset.cfExpiryDate) < new Date();
                const badgeColor = isExpired ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800';
                const badgeText = isExpired ? '🔴 Tamat Tempoh' : '🟢 Sah';
                const dateStr = new Date(asset.cfExpiryDate).toLocaleDateString('ms-MY');

                const html = `
                    <div class="glass-card rounded-2xl overflow-hidden hover:shadow-md transition-shadow group flex flex-col h-full">
                        <div class="p-5 border-b border-gray-100 flex-grow">
                            <div class="flex justify-between items-start mb-4">
                                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${badgeColor}">
                                    ${badgeText}
                                </span>
                                <!-- Option dot menu if needed -->
                            </div>
                            <h3 class="text-xl font-bold text-gray-900 mb-1">${asset.title}</h3>
                            <div class="space-y-2 mt-4">
                                <div class="flex text-sm">
                                    <span class="text-gray-500 w-24">No PMT:</span>
                                    <span class="font-medium text-gray-900">${asset.pmtNo || '-'}</span>
                                </div>
                                <div class="flex text-sm">
                                    <span class="text-gray-500 w-24">Serial No:</span>
                                    <span class="font-medium text-gray-900">${asset.serialNo || '-'}</span>
                                </div>
                                <div class="flex text-sm">
                                    <span class="text-gray-500 w-24">Tamat CF:</span>
                                    <span class="font-medium ${isExpired ? 'text-red-600' : 'text-gray-900'}">${dateStr}</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-gray-50 px-5 py-3">
                            <button onclick="viewAsset('${asset._id}')" class="w-full text-center text-sm font-medium text-navy hover:text-safety transition-colors">
                                Lihat Detail Penuh →
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += html;
            });
        }

        // Filtering Logic
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const status = document.getElementById('status-filter').value;
            
            const filtered = allAssets.filter(asset => {
                const matchesSearch = asset.title.toLowerCase().includes(searchTerm) || 
                                      (asset.pmtNo && asset.pmtNo.toLowerCase().includes(searchTerm));
                
                const isExpired = new Date(asset.cfExpiryDate) < new Date();
                let matchesStatus = true;
                if (status === 'Valid') matchesStatus = !isExpired;
                if (status === 'Expired') matchesStatus = isExpired;
                
                return matchesSearch && matchesStatus;
            });
            
            renderAssets(filtered);
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('status-filter').addEventListener('change', applyFilters);

        function viewAsset(id) {
            // Send message back to Velo to navigate
            window.parent.postMessage({ type: 'NAVIGATE', url: `/assets/${id}` }, "*");
        }

        // UNTUK TESTING / LIVE PREVIEW LUAR WIX
        // Kalau buka fail html ni direct dekat browser (local), dia akan tunjuk mock data
        if (!window.location.hostname.includes("wix.com") && !window.location.hostname.includes("editorx.io")) {
            setTimeout(() => {
                window.postMessage({
                    type: 'ASSETS_DATA',
                    assets: [
                        { _id: '1', title: 'Boiler Unit A', pmtNo: 'PMT-001', serialNo: 'BLR-A', cfExpiryDate: '2026-12-01' },
                        { _id: '2', title: 'Overhead Crane', pmtNo: 'PMT-002', serialNo: 'CRN-B', cfExpiryDate: '2022-01-01' }, // Expired
                        { _id: '3', title: 'Pressure Vessel', pmtNo: 'PMT-003', serialNo: 'PV-C', cfExpiryDate: '2024-08-15' }
                    ]
                }, "*");
            }, 1500); // loading 1.5 saat
        }
    </script>
</body>
</html>
